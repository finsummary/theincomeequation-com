<!DOCTYPE html>
<html lang="en">
<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <main class="page">
    <header class="header">

          alt="The Income Equation book cover"
          class="cover-img"

      <!-- Optional: add more book photos later in a gallery -->
      <!-- <div class="gallery">
        <img src="images/photo1.jpg" alt="Book photo 1">

      <p class="tagline">

      </p>

    <section class="subscribe">
      <p class="subscribe-text">Get updates, excerpts, and early access. Subscribe on Substack.</p>
      <a
        href="https://YOUR-SUBSTACK-URL.substack.com"
        class="btn btn-substack"
        target="_blank"
        rel="noopener noreferrer"
      >
        Subscribe on Substack
      </a>

    <footer class="footer">
      <p>&copy; Vlad Ost. The Income Equation.</p>
